services:
  db:
    image: postgres:16
    container_name: payment_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payment}
      POSTGRES_DB: ${POSTGRES_DB:-payment}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payment} -d ${POSTGRES_DB:-payment}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: payment_rabbitmq
    restart: always
    ports:
      - "5675:5672"
      - "15675:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build: .
    container_name: payment_service
    restart: always
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-payment}:${POSTGRES_PASSWORD:-payment}@db:5432/${POSTGRES_DB:-payment}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      AUTH_TOKEN_URL: http://host.docker.internal:8011/token
      PAYMENT_PUBLIC_BASE_URL: http://localhost:8013
    ports:
      - "8013:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
