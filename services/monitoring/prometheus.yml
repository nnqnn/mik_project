global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: monolith
    metrics_path: /metrics
    static_configs:
      - targets:
          - monolith:8000

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth-api:8000

  - job_name: ticketing-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - ticketing-api:8001

  - job_name: payment-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - payment-service:8000
