services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ticketing-rabbitmq
    ports:
      - "5676:5672"
      - "15676:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ticketing-fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketing-fastapi
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/ticketing.db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_QUEUE: ticketing.events
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret}
      AUTH_TOKEN_URL: http://host.docker.internal:8011/token
      MONOLITH_API_BASE_URL: http://host.docker.internal:8000
      PAYMENT_SERVICE_URL: http://host.docker.internal:8013
      TICKETING_PUBLIC_BASE_URL: http://localhost:8012
    ports:
      - "8012:8001"
    volumes:
      - ticketing_db:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  ticketing-consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketing-consumer
    command: ["python", "-m", "app.consumer"]
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/ticketing.db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_QUEUE: ticketing.events
      PAYMENT_EVENTS_QUEUE: ticketing.payment.events
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ticketing_db:/app/data
    restart: unless-stopped

volumes:
  ticketing_db:
